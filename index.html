<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nothing OS Shell Concept</title>
    <style>
        :root {
            --bg-dark: #06141B;
            --bg-medium: #11212D;
            --bg-light: #253745;
            --accent: #4A5C6A;
            --text-muted: #9BA8AB;
            --text-bright: #CCD0CF;
            --white: #FFFFFF;
            --red: #FF3B30; /* Nothing OS accent */
            --radius-pill: 24px;
            --radius-round: 50%;
            --border-style: 1px solid rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: var(--text-bright);
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            -webkit-font-smoothing: antialiased;
        }

        /* The Main Floating Bar */
        .shell-bar {
            margin-top: 16px;
            width: calc(100% - 32px);
            max-width: 1300px;
            height: 54px;
            background-color: var(--bg-dark);
            border-radius: var(--radius-pill);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 8px;
            border: var(--border-style);
        }

        /* Groups */
        .group {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Widgets/Pills */
        .widget {
            background-color: var(--bg-medium);
            padding: 6px 14px;
            height: 38px;
            box-sizing: border-box;
            border-radius: var(--radius-pill);
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            font-weight: 600;
            border: var(--border-style);
        }

        .widget-icon {
            width: 18px;
            height: 18px;
            fill: currentColor;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Workspaces - Nothing style dots */
        .workspaces {
            display: flex;
            gap: 8px;
            padding: 0 12px;
        }

        .workspace-dot {
            width: 6px;
            height: 6px;
            background-color: var(--accent);
            border-radius: var(--radius-round);
            transition: all 0.3s ease;
        }

        .workspace-dot.active {
            width: 18px;
            background-color: var(--white);
            border-radius: 4px;
        }

        /* Clock - Bold and Clean */
        .clock {
            background-color: transparent;
            font-size: 15px;
            letter-spacing: 1px;
            color: var(--white);
        }

        .clock span {
            color: var(--red);
            margin: 0 4px;
        }

        /* System Info / Tray */
        .tray-icon {
            width: 38px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            border-radius: var(--radius-round);
            transition: background 0.2s;
        }

        .tray-icon:hover {
            background-color: var(--bg-light);
            color: var(--white);
        }

        /* Specific Nothing OS touch: Circular buttons */
        .circle-btn {
            width: 38px;
            height: 38px;
            background-color: var(--bg-medium);
            border-radius: var(--radius-round);
            display: flex;
            align-items: center;
            justify-content: center;
            border: var(--border-style);
            color: var(--white);
        }

        .circle-btn svg {
            width: 20px;
            height: 20px;
        }

        /* Layout for visualization */
        .desktop-preview {
            flex-grow: 1;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-muted);
            font-size: 24px;
            opacity: 0.3;
            user-select: none;
        }

    </style>
</head>
<body>

    <div class="shell-bar">
        <!-- Left: Workspaces and Menu -->
        <div class="group">
            <div class="circle-btn">
                <svg class="widget-icon" viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
            </div>
            <div class="workspaces">
                <div class="workspace-dot active"></div>
                <div class="workspace-dot"></div>
                <div class="workspace-dot"></div>
                <div class="workspace-dot"></div>
            </div>
        </div>

        <!-- Center: Clock -->
        <div class="group">
            <div class="widget clock">
                12:45 <span>•</span> ПН, 23 МАЯ
            </div>
        </div>

        <!-- Right: Audio, System, Tray -->
        <div class="group">
            <div class="widget">
                <svg class="widget-icon" viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-4z"/></svg>
                <span>The Weeknd - Blinding Lights</span>
            </div>

            <div class="widget">
                <svg class="widget-icon" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                <span>RU</span>
            </div>

            <div class="group tray-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
            </div>

            <div class="group tray-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="16" height="10" rx="2" ry="2"></rect><line x1="22" y1="11" x2="22" y2="13"></line></svg>
            </div>

            <div class="circle-btn">
                <svg class="widget-icon" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/></svg>
            </div>
        </div>
    </div>

    <div class="desktop-preview">
        HYPRLAND
    </div>

</body>
</html>
